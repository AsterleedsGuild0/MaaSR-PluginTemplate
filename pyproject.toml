[project]
name = "MaaSR-PluginTemplate"
version = "1.0.0"
description = "用于MAASR的侧载插件模板"
authors = [
    { name = "AZMIAO", email = "2362020227@qq.com" },
]
license = { text = "AGPL-3.0" }
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pip>=25.3",
    "toml>=0.10.2",
]

# isort检查工具配置
[tool.isort]
src_paths = ["agent", "scropts"]
force_single_line = false
multi_line_output = 0
include_trailing_comma = false
ensure_newline_before_comments = true
line_length = 120
combine_as_imports = true
lines_between_sections = 1
sections = ["STDLIB", "THIRDPARTY", "FIRSTPARTY"]
